services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    depends_on:
      - n8n
      - langgraph-agent
    networks:
      - cgcs-net

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - GENERIC_TIMEZONE=America/Chicago
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - LANGGRAPH_API_KEY=${LANGGRAPH_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cgcs-net

  langgraph-agent:
    build:
      context: ./langgraph-agent
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - LANGGRAPH_API_KEY=${LANGGRAPH_API_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-60}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-3}
      - DEAD_LETTER_MAX_FAILURES=${DEAD_LETTER_MAX_FAILURES:-3}
      # LangSmith
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-cgcs-automation}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-true}
      # Google APIs
      - GOOGLE_SERVICE_ACCOUNT_FILE=${GOOGLE_SERVICE_ACCOUNT_FILE:-}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID:-primary}
      - PET_TRACKER_SPREADSHEET_ID=${PET_TRACKER_SPREADSHEET_ID:-}
      # Zoho Mail
      - ZOHO_MAIL_TOKEN=${ZOHO_MAIL_TOKEN:-}
      - ZOHO_ACCOUNT_ID=${ZOHO_ACCOUNT_ID:-}
      # Email
      - EMAIL_AUTO_SEND_ALLOWLIST=${EMAIL_AUTO_SEND_ALLOWLIST:-}
    volumes:
      - ./credentials:/app/credentials:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cgcs-net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
      - ./db/migrations/002_seed_data.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro
      - ./db/migrations/003_multi_capability.sql:/docker-entrypoint-initdb.d/04-multi-capability.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cgcs-net

volumes:
  caddy_data:
  caddy_config:
  n8n_data:
  postgres_data:

networks:
  cgcs-net:
    driver: bridge
