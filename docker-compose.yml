services:

  n8n:
    labels:
      - "coolify.port=5678"
      - "coolify.managed=true"
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - GENERIC_TIMEZONE=America/Chicago
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - LANGGRAPH_API_KEY=${LANGGRAPH_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cgcs-net

  langgraph-agent:
    labels:
      - "coolify.port=8000"
      - "coolify.managed=true"
    build:
      # repo root so the Dockerfile can COPY db/migrations into the image
      context: .
      dockerfile: langgraph-agent/Dockerfile
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - LANGGRAPH_API_KEY=${LANGGRAPH_API_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-60}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-3}
      - DEAD_LETTER_MAX_FAILURES=${DEAD_LETTER_MAX_FAILURES:-3}
      # LangSmith
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-cgcs-automation}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-true}
      # Google APIs
      - GOOGLE_SERVICE_ACCOUNT_FILE=${GOOGLE_SERVICE_ACCOUNT_FILE:-/app/credentials/google-service-account.json}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID:-primary}
      - PET_TRACKER_SPREADSHEET_ID=${PET_TRACKER_SPREADSHEET_ID:-}
      - GMAIL_DELEGATED_USER=${GMAIL_DELEGATED_USER:-admin@cgcs-acc.org}
      # Smartsheet inbox poller
      - SMARTSHEET_POLL_ENABLED=${SMARTSHEET_POLL_ENABLED:-true}
      - SMARTSHEET_POLL_MINUTES=${SMARTSHEET_POLL_MINUTES:-5}
      # Zoho Mail (legacy)
      - ZOHO_MAIL_TOKEN=${ZOHO_MAIL_TOKEN:-}
      - ZOHO_ACCOUNT_ID=${ZOHO_ACCOUNT_ID:-}
      # Email
      - EMAIL_AUTO_SEND_ALLOWLIST=${EMAIL_AUTO_SEND_ALLOWLIST:-}
    volumes:
      - ./credentials:/app/credentials:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cgcs-net

  cgcs-dashboard:
    labels:
      - "coolify.port=3000"
      - "coolify.managed=true"
    build:
      context: ./cgcs-dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - AGENT_API_URL=${AGENT_API_URL:-http://langgraph-agent:8000}
      - LANGGRAPH_API_KEY=${LANGGRAPH_API_KEY}
      - NEXTAUTH_URL=${DASHBOARD_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - ALLOWED_EMAIL_DOMAINS=${ALLOWED_EMAIL_DOMAINS:-austincc.edu,cgcs-acc.org}
    depends_on:
      langgraph-agent:
        condition: service_started
    networks:
      - cgcs-net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
      - ./db/migrations/002_seed_data.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro
      - ./db/migrations/003_multi_capability.sql:/docker-entrypoint-initdb.d/04-multi-capability.sql:ro
      - ./db/migrations/005_revenue_tracking.sql:/docker-entrypoint-initdb.d/05-revenue.sql:ro
      - ./db/migrations/007_compliance_checklist.sql:/docker-entrypoint-initdb.d/07-compliance.sql:ro
      - ./db/migrations/008_rejection_patterns.sql:/docker-entrypoint-initdb.d/08-rejection.sql:ro
      - ./db/migrations/009_quote_versions.sql:/docker-entrypoint-initdb.d/09-quotes.sql:ro
      - ./db/migrations/010_dashboard_alerts.sql:/docker-entrypoint-initdb.d/10-alerts.sql:ro
      - ./db/migrations/011_impact_metrics.sql:/docker-entrypoint-initdb.d/11-impact.sql:ro
      - ./db/migrations/012_cgcs_lead_and_metadata.sql:/docker-entrypoint-initdb.d/12-lead-metadata.sql:ro
      - ./db/migrations/013_budget_ledger.sql:/docker-entrypoint-initdb.d/13-budget.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cgcs-net

volumes:
  n8n_data:
  postgres_data:

networks:
  cgcs-net:
    driver: bridge
